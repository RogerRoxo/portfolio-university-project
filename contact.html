<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    
    <div id="header"></div>

    <!-- Contact Area -->
    <section>
        <div class="contact-area">

            <p class="mensage-contact">Entre em contato comigo</p>
            <br>

            <form id="contact-form" class="flex">
                <input type="text" class="form-input" name="name" id="name" placeholder="Nome" maxlength="100" required>
                <input type="email" class="form-input" name="email" id="email" placeholder="E-mail" maxlength="100" required>
                <textarea name="msg" class="form-input" id="msg" rows="5" cols="40" placeholder="Mensagem" maxlength="200" minlength="30" required></textarea>
                <button type="submit" class="form-input">Enviar</button>
            </form>
            <br>
            <br>
        </div>
    </section>



    
    <script src="js/load-components.js"></script>
    <script src="js/contact.js"></script>
</body>
</html>
